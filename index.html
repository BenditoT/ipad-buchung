// ============================================================
// Koffer View
// ============================================================
function KofferView({ koffer, buchungen, stunden, today }) {
  const now = new Date();
  const currentMinutes = now.getHours() * 60 + now.getMinutes();

  function getCurrentBooking(kofferId) {
    return buchungen.find(b => {
      if (b.kofferId !== kofferId || b.datum !== today) return false;
      const vonStd = stunden.find(s => s.stunde === parseInt(b.stunde));
      const bisStd = stunden.find(s => s.stunde === parseInt(b.bisStunde || b.stunde));
      if (!vonStd || !bisStd) return false;
      const [vh, vm] = vonStd.von.split(':').map(Number);
      const [bh, bm] = bisStd.bis.split(':').map(Number);
      return currentMinutes >= vh*60+vm && currentMinutes <= bh*60+bm;
    });
  }

  function getNextBooking(kofferId) {
    return buchungen
      .filter(b => b.kofferId === kofferId && b.datum >= today && b.status !== 'storniert')
      .sort((a,b) => a.datum.localeCompare(b.datum) || a.stunde - b.stunde)
      .find(b => {
        if (b.datum > today) return true;
        const std = stunden.find(s => s.stunde === parseInt(b.stunde));
        if (!std) return false;
        const [h, m] = std.von.split(':').map(Number);
        return h*60+m > currentMinutes;
      });
  }

  if (!koffer.length) return html`<div class="empty-state"><div class="icon">📦</div><p>Keine Koffer geladen</p></div>`;

  return html`
    <div class="koffer-list">
      ${koffer.map(k => {
        const current = getCurrentBooking(k.id);
        const next = getNextBooking(k.id);
        const borderColor = k.id === 'K-A' ? 'var(--koffer-a)' : k.id === 'K-B' ? 'var(--koffer-b)' : 'var(--koffer-c)';
        return html`
          <div class="koffer-card" style="border-left-color: ${borderColor}">
            <h3>📦 ${k.bezeichnung} — ${k.anzahlIpads} iPads</h3>
            <div class="meta">${k.wagen} · ${k.standort}</div>
            ${k.bemerkung && html`<div class="meta" style="color: var(--yellow);">⚠️ ${k.bemerkung}</div>`}
            ${current
              ? html`<span class="status-badge badge-booked">Gebucht: ${current.lehrkraft} (St. ${current.stunde}, ${current.raum})</span>`
              : html`<span class="status-badge badge-free">Verfügbar</span>`
            }
            ${next && html`
              <div class="meta" style="margin-top:4px;">
                Nächste Buchung: ${next.datum === today ? '' : next.datum + ' '}St. ${next.stunde} (${next.lehrkraft})
              </div>
            `}
          </div>
        `;
      })}
    </div>
  `;
}

// ============================================================
// Meine Buchungen View
// ============================================================
function MeineView({ buchungen, koffer, stunden, onCancel }) {
  if (!buchungen.length) return html`<div class="empty-state"><div class="icon">👤</div><p>Keine aktuellen Buchungen</p></div>`;

  const sorted = [...buchungen].sort((a,b) => a.datum.localeCompare(b.datum) || a.stunde - b.stunde);

  return html`
    <div class="my-bookings">
      <h3 style="padding: 8px 0; font-size: 16px;">Meine Buchungen</h3>
      ${sorted.map(b => html`
        <div class="booking-card">
          <div class="booking-info">
            <div class="booking-date">
              ${fmtDateLong(b.datum)}
              ${b.serienId ? html`<span class="serie-badge">Serie</span>` : ''}
            </div>
            <div class="booking-detail">
              St. ${b.stunde}${b.bisStunde > b.stunde ? '–' + b.bisStunde : ''} ·
              ${kofferLabel(b.kofferId, koffer)} · ${b.raum || 'kein Raum'}
            </div>
            ${b.bemerkung && html`<div class="booking-detail">${b.bemerkung}</div>`}
          </div>
          <div class="booking-actions">
            <button class="btn-small btn-storno" onClick=${() => onCancel(b.id)}>Stornieren</button>
          </div>
        </div>
      `)}
    </div>
  `;
}

// ============================================================
// Last-Minute Schnellbuchung
// ============================================================
function LastMinuteBar({ stunden, koffer, buchungen, user, userPin, today, onBook, onToast, onReload }) {
  const [showModal, setShowModal] = useState(false);
  const [booking, setBooking] = useState(false);
  const [raum, setRaum] = useState('');

  const now = new Date();
  const currentMinutes = now.getHours() * 60 + now.getMinutes();
  const todayStr = fmtDate(now);
  const isWeekday = now.getDay() >= 1 && now.getDay() <= 5;

  // Determine current block
  const currentBlock = useMemo(() => {
    if (!isWeekday || isFerien(todayStr)) return null;
    // Blocks: 1-2, 3-4, 5, 6
    const blocks = [
      { name: '1.–2. Stunde', stunden: [1, 2], emoji: '🌅' },
      { name: '3.–4. Stunde', stunden: [3, 4], emoji: '☀️' },
      { name: '5. Stunde', stunden: [5], emoji: '🌤️' },
      { name: '6. Stunde', stunden: [6], emoji: '🌇' },
    ];
    for (const block of blocks) {
      const firstStd = stunden.find(s => s.stunde === block.stunden[0]);
      const lastStd = stunden.find(s => s.stunde === block.stunden[block.stunden.length - 1]);
      if (!firstStd || !lastStd) continue;
      const [vh, vm] = firstStd.von.split(':').map(Number);
      const [bh, bm] = lastStd.bis.split(':').map(Number);
      // Show block if we're within 15 min before start until end
      if (currentMinutes >= (vh * 60 + vm - 15) && currentMinutes <= (bh * 60 + bm)) {
        return { ...block, von: firstStd.von, bis: lastStd.bis, vonStunde: block.stunden[0], bisStunde: block.stunden[block.stunden.length - 1] };
      }
    }
    // Show next upcoming block
    for (const block of blocks) {
      const firstStd = stunden.find(s => s.stunde === block.stunden[0]);
      if (!firstStd) continue;
      const [vh, vm] = firstStd.von.split(':').map(Number);
      if (currentMinutes < vh * 60 + vm) {
        const lastStd = stunden.find(s => s.stunde === block.stunden[block.stunden.length - 1]);
        return { ...block, von: firstStd.von, bis: lastStd?.bis || firstStd.bis, vonStunde: block.stunden[0], bisStunde: block.stunden[block.stunden.length - 1], upcoming: true };
      }
    }
    return null;
  }, [stunden, currentMinutes, isWeekday, todayStr]);

  // Available Koffer for current block
  const kofferStatus = useMemo(() => {
    if (!currentBlock) return [];
    return koffer.map(k => {
      const conflict = buchungen.find(b => {
        if (b.kofferId !== k.id || b.datum !== todayStr) return false;
        const bVon = parseInt(b.stunde);
        const bBis = parseInt(b.bisStunde || b.stunde);
        return currentBlock.vonStunde <= bBis && currentBlock.bisStunde >= bVon;
      });
      return { ...k, free: !conflict, bookedBy: conflict?.lehrkraft || null };
    });
  }, [currentBlock, koffer, buchungen, todayStr]);

  const freeCount = kofferStatus.filter(k => k.free).length;

  const handleQuickBook = async (kofferId) => {
    if (booking) return;
    setBooking(true);
    try {
      await apiPost('book', { data: {
        datum: todayStr,
        stunde: String(currentBlock.vonStunde),
        bisStunde: String(currentBlock.bisStunde),
        kofferId,
        raum: raum || '',
        bemerkung: 'Last-Minute-Buchung',
        lehrkraft: user,
        pin: userPin,
      }});
      onToast({ message: '⚡ Last-Minute gebucht!', type: 'success' });
      setShowModal(false);
      onReload();
    } catch (e) {
      onToast({ message: e.message, type: 'error' });
    }
    setBooking(false);
  };

  if (!currentBlock || !isWeekday || isFerien(todayStr)) return null;

  const funPhrases = ['Jetzt schnappen! 🎯', 'iPads frei! 🚀', 'Zugreifen! ⚡', 'Schnell buchen! 🏃'];
  const phrase = funPhrases[Math.floor(currentMinutes / 15) % funPhrases.length];

  return html`
    <div class="last-minute-bar" onClick=${() => setShowModal(true)}>
      <span class="last-minute-icon">${currentBlock.upcoming ? '⏰' : '⚡'}</span>
      <div class="last-minute-text">
        <div class="last-minute-title">${currentBlock.upcoming ? 'Gleich:' : 'JETZT:'} ${currentBlock.name}</div>
        <div class="last-minute-sub">${currentBlock.von}–${currentBlock.bis} · ${freeCount}/${koffer.length} Koffer frei</div>
      </div>
      <div class="last-minute-badge">${phrase}</div>
    </div>

    ${showModal && html`
      <div class="modal-overlay" onClick=${e => { if (e.target === e.currentTarget) setShowModal(false); }}>
        <div class="modal">
          <div class="modal-handle"></div>
          <div class="last-minute-modal-header">
            <div class="icon">⚡</div>
            <h2>Last-Minute-Buchung</h2>
            <div class="block-info">${currentBlock.emoji} ${currentBlock.name} (${currentBlock.von}–${currentBlock.bis})</div>
          </div>

          <div class="form-group">
            <label class="form-label">Raum (optional)</label>
            <input class="form-input" type="text" placeholder="z.B. R 204"
              value=${raum} onInput=${e => setRaum(e.target.value)} />
          </div>

          <div style="font-size:13px; font-weight:700; color:var(--gray); margin: 12px 0 8px;">
            Koffer antippen zum Buchen:
          </div>

          ${kofferStatus.map(k => {
            const borderColor = k.id === 'K-A' ? 'var(--koffer-a)' : k.id === 'K-B' ? 'var(--koffer-b)' : 'var(--koffer-c)';
            return html`
              <button class="koffer-quick-btn ${k.free ? '' : 'taken'}"
                style="border-left: 4px solid ${borderColor};"
                onClick=${() => k.free && handleQuickBook(k.id)}
                disabled=${!k.free || booking}>
                <span class="kq-icon">${k.free ? '📦' : '🔒'}</span>
                <div>
                  <div class="kq-name">${k.bezeichnung}</div>
                  <div class="kq-info">${k.anzahlIpads} iPads · ${k.standort}</div>
                </div>
                <span class="kq-status ${k.free ? 'kq-free' : 'kq-taken'}">
                  ${k.free ? '✓ FREI' : k.bookedBy}
                </span>
              </button>
            `;
          })}

          ${booking && html`<div style="text-align:center; padding:12px;"><div class="spinner" style="border-color:var(--blue-light);border-top-color:var(--blue);width:28px;height:28px;"></div></div>`}

          <div style="font-size:12px; color:var(--gray); text-align:center; margin-top:12px;">
            Gebucht als: <strong>${user}</strong>
          </div>
        </div>
      </div>
    `}
  `;
}

// ============================================================
// 3-Monatsplan View
// ============================================================
function QuarterView({ koffer, apiUrl, onNavigateWeek }) {
  // Start from current month
  const [startMonth, setStartMonth] = useState(() => {
    const now = new Date();
    return { year: now.getFullYear(), month: now.getMonth() };
  });
  const [quarterBookings, setQuarterBookings] = useState([]);
  const [loading, setLoading] = useState(true);

  // Calculate 3 months range
  const months = useMemo(() => {
    const result = [];
    for (let i = 0; i < 3; i++) {
      let m = startMonth.month + i;
      let y = startMonth.year;
      if (m > 11) { m -= 12; y++; }
      result.push({ year: y, month: m });
    }
    return result;
  }, [startMonth]);

  const dateRange = useMemo(() => {
    const first = months[0];
    const last = months[2];
    const startDate = `${first.year}-${String(first.month + 1).padStart(2, '0')}-01`;
    const lastDay = new Date(last.year, last.month + 1, 0).getDate();
    const endDate = `${last.year}-${String(last.month + 1).padStart(2, '0')}-${String(lastDay).padStart(2, '0')}`;
    return { startDate, endDate };
  }, [months]);

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    apiGet('getDateRange', { startDate: dateRange.startDate, endDate: dateRange.endDate })
      .then(data => {
        if (!cancelled) {
          setQuarterBookings(Array.isArray(data) ? data : []);
          setLoading(false);
        }
      })
      .catch(() => { if (!cancelled) setLoading(false); });
    return () => { cancelled = true; };
  }, [dateRange]);

  const MONATSNAMEN = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
  const TAGE_KURZ = ['Mo','Di','Mi','Do','Fr'];

  const prevQ = () => {
    let m = startMonth.month - 3;
    let y = startMonth.year;
    if (m < 0) { m += 12; y--; }
    setStartMonth({ year: y, month: m });
  };
  const nextQ = () => {
    let m = startMonth.month + 3;
    let y = startMonth.year;
    if (m > 11) { m -= 12; y++; }
    setStartMonth({ year: y, month: m });
  };
  const goCurrentMonth = () => {
    const now = new Date();
    setStartMonth({ year: now.getFullYear(), month: now.getMonth() });
  };

  const todayStr = fmtDate(new Date());

  // Build booking lookup: date -> array of bookings
  const bookingsByDate = useMemo(() => {
    const map = {};
    quarterBookings.forEach(b => {
      if (!map[b.datum]) map[b.datum] = [];
      map[b.datum].push(b);
    });
    return map;
  }, [quarterBookings]);

  const renderMonth = (monthInfo) => {
    const { year, month } = monthInfo;
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0).getDate();

    // Build weeks (Mon-Fri rows)
    const weeks = [];
    let currentWeek = [null, null, null, null, null]; // Mo-Fr

    for (let day = 1; day <= lastDay; day++) {
      const d = new Date(year, month, day);
      const dow = d.getDay(); // 0=So, 1=Mo, ..., 5=Fr, 6=Sa
      if (dow >= 1 && dow <= 5) { // Only Mon-Fri
        currentWeek[dow - 1] = day;
      }
      // End of week (Friday) or last day of month
      if (dow === 5 || day === lastDay) {
        if (currentWeek.some(d => d !== null)) {
          weeks.push([...currentWeek]);
        }
        currentWeek = [null, null, null, null, null];
      }
    }

    return html`
      <div class="month-block">
        <h3>${MONATSNAMEN[month]} ${year}</h3>
        <table class="month-table">
          <thead>
            <tr>
              <th style="width:35px;">KW</th>
              ${TAGE_KURZ.map(t => html`<th>${t}</th>`)}
            </tr>
          </thead>
          <tbody>
            ${weeks.map(week => {
              // Find the first valid day in this week for KW
              const firstValidDay = week.find(d => d !== null);
              const kwDate = firstValidDay ? new Date(year, month, firstValidDay) : null;
              const kw = kwDate ? getKW(kwDate) : '';

              return html`
                <tr>
                  <td style="font-weight:600; color:var(--gray); font-size:11px;">${kw}</td>
                  ${week.map((day, idx) => {
                    if (day === null) return html`<td></td>`;
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const isToday = dateStr === todayStr;
                    const ferien = isFerien(dateStr);
                    const bookings = bookingsByDate[dateStr] || [];

                    if (ferien) {
                      return html`<td class="ferien-cell" title=${getFerienName(dateStr)}>${day}</td>`;
                    }

                    const cellClass = isToday ? 'today-cell' : '';
                    const hasBookings = bookings.length > 0;

                    return html`
                      <td class="${cellClass} clickable"
                          onClick=${() => onNavigateWeek(getMonday(new Date(dateStr + 'T00:00:00')))}
                          title=${hasBookings ? bookings.length + ' Buchung(en) — Klick → Woche' : 'Klick → Woche'}>
                        <div>${day}</div>
                        ${hasBookings && html`
                          <div style="display:flex;justify-content:center;flex-wrap:wrap;gap:1px;margin-top:2px;">
                            ${bookings.slice(0, 6).map(b => {
                              const color = b.kofferId === 'K-A' ? 'var(--koffer-a)' : b.kofferId === 'K-B' ? 'var(--koffer-b)' : 'var(--koffer-c)';
                              return html`<span class="booking-dot" style="background:${color}"></span>`;
                            })}
                            ${bookings.length > 6 ? html`<span style="font-size:9px;color:var(--gray);">+${bookings.length - 6}</span>` : ''}
                          </div>
                        `}
                      </td>
                    `;
                  })}
                </tr>
              `;
            })}
          </tbody>
        </table>
      </div>
    `;
  };

  const label = `${MONATSNAMEN[months[0].month]} – ${MONATSNAMEN[months[2].month]} ${months[2].year}`;

  return html`
    <div class="quarter-view">
      <div class="quarter-nav">
        <button onClick=${prevQ}>◀ 3 Mon.</button>
        <span class="quarter-label">${label}</span>
        <button onClick=${nextQ}>3 Mon. ▶</button>
        <button style="background:var(--green);color:white;font-size:12px;" onClick=${goCurrentMonth}>Heute</button>
      </div>

      ${loading ? html`<div class="loading-overlay"><div class="spinner"></div><span>Lade 3-Monatsdaten...</span></div>` : html`
        ${months.map(m => renderMonth(m))}

        <div style="margin-top: 12px; font-size: 12px; color: var(--gray); display: flex; gap: 16px; flex-wrap: wrap;">
          <span>Zeitraum: <strong>${quarterBookings.length}</strong> Buchungen</span>
          ${koffer.map(k => {
            const count = quarterBookings.filter(b => b.kofferId === k.id).length;
            const color = k.id === 'K-A' ? 'var(--koffer-a)' : k.id === 'K-B' ? 'var(--koffer-b)' : 'var(--koffer-c)';
            return html`<span style="display:flex;align-items:center;gap:4px;">
              <span style="width:10px;height:10px;border-radius:2px;background:${color};display:inline-block;"></span>
              ${k.bezeichnung}: ${count}
            </span>`;
          })}
        </div>
      `}
    </div>
  `;
}

// ============================================================
// Year View (Admin only)
// ============================================================
function YearView({ koffer, apiUrl, onNavigateWeek }) {
  const [schuljahr, setSchuljahr] = useState(getSchuljahr(new Date()));
  const [yearBookings, setYearBookings] = useState([]);
  const [loading, setLoading] = useState(true);

  const weeks = useMemo(() => getAllSchulwochen(schuljahr), [schuljahr]);
  const range = useMemo(() => getSchuljahrRange(schuljahr), [schuljahr]);

  useEffect(() => {
    let cancelled = false;
    setLoading(true);
    apiGet('getDateRange', { startDate: range.startDate, endDate: range.endDate })
      .then(data => {
        if (!cancelled) {
          setYearBookings(Array.isArray(data) ? data : []);
          setLoading(false);
        }
      })
      .catch(() => { if (!cancelled) setLoading(false); });
    return () => { cancelled = true; };
  }, [schuljahr]);

  const weekStats = useMemo(() => {
    const stats = {};
    weeks.forEach(w => {
      stats[w.monStr] = { total: 0, byKoffer: {} };
      koffer.forEach(k => { stats[w.monStr].byKoffer[k.id] = 0; });
    });
    yearBookings.forEach(b => {
      const bDate = new Date(b.datum + 'T00:00:00');
      const bMonday = getMonday(bDate);
      const monStr = fmtDate(bMonday);
      if (stats[monStr]) {
        stats[monStr].total++;
        if (stats[monStr].byKoffer[b.kofferId] !== undefined) {
          stats[monStr].byKoffer[b.kofferId]++;
        }
      }
    });
    return stats;
  }, [weeks, yearBookings, koffer]);

  const todayStr = fmtDate(new Date());
  const todayMonday = fmtDate(getMonday(new Date()));

  const prevSJ = () => setSchuljahr({ start: schuljahr.start - 1, end: schuljahr.end - 1, label: `${schuljahr.start - 1}/${schuljahr.end - 1}` });
  const nextSJ = () => setSchuljahr({ start: schuljahr.start + 1, end: schuljahr.end + 1, label: `${schuljahr.start + 1}/${schuljahr.end + 1}` });

  return html`
    <div class="year-view">
      <div class="year-nav">
        <button onClick=${prevSJ}>◀</button>
        <span class="year-label">Schuljahr ${schuljahr.label}</span>
        <button onClick=${nextSJ}>▶</button>
      </div>

      ${loading ? html`<div class="loading-overlay"><div class="spinner"></div><span>Lade Schuljahr-Daten...</span></div>` : html`
        <div style="overflow-x: auto;">
          <table class="year-table">
            <thead>
              <tr>
                <th>KW</th>
                <th>Zeitraum</th>
                <th>Buchungen</th>
                <th>Details</th>
              </tr>
            </thead>
            <tbody>
              ${weeks.map(w => {
                const stats = weekStats[w.monStr] || { total: 0, byKoffer: {} };
                const isTodayWeek = w.monStr === todayMonday;
                const rowClass = w.isFerien ? 'ferien-row' : isTodayWeek ? 'today-row' : '';
                return html`
                  <tr class=${rowClass} onClick=${() => !w.isFerien && onNavigateWeek(w.montag)}>
                    <td style="font-weight:600; width:40px;">${w.kw}</td>
                    <td style="white-space:nowrap;">
                      ${fmtDateShort(w.montag)} – ${fmtDateShort(addDays(w.montag, 4))}
                      ${w.isFerien ? html` · ${w.ferienName}` : ''}
                    </td>
                    <td style="width:50px; text-align:center; font-weight:600;">
                      ${w.isFerien ? '—' : stats.total || ''}
                    </td>
                    <td>
                      ${!w.isFerien && stats.total > 0 && html`
                        <div class="year-bar">
                          ${koffer.map(k => {
                            const count = stats.byKoffer[k.id] || 0;
                            if (!count) return null;
                            const color = k.id === 'K-A' ? 'var(--koffer-a)' : k.id === 'K-B' ? 'var(--koffer-b)' : 'var(--koffer-c)';
                            return html`<div class="year-bar-seg" style="background:${color}; width:${count * 8}px;" title="${k.bezeichnung}: ${count}"></div>`;
                          })}
                        </div>
                      `}
                    </td>
                  </tr>
                `;
              })}
            </tbody>
          </table>
        </div>

        <div style="margin-top: 16px; font-size: 12px; color: var(--gray); display: flex; gap: 16px; flex-wrap: wrap;">
          <span>Gesamt: <strong>${yearBookings.length}</strong> Buchungen</span>
          ${koffer.map(k => {
            const count = yearBookings.filter(b => b.kofferId === k.id).length;
            const color = k.id === 'K-A' ? 'var(--koffer-a)' : k.id === 'K-B' ? 'var(--koffer-b)' : 'var(--koffer-c)';
            return html`<span style="display:flex;align-items:center;gap:4px;">
              <span style="width:10px;height:10px;border-radius:2px;background:${color};display:inline-block;"></span>
              ${k.bezeichnung}: ${count}
            </span>`;
          })}
        </div>
      `}
    </div>
  `;
}
